<div class="login-container">

  <div class="univ-logo-peek">
    <img src="escudo-usac.png" alt="Escudo USAC" class="logo-img-real">
  </div>

  <div class="login-box">
    
    <div class="logo-usac">
      <h1>Recuperar Contraseña</h1>
      <p>Facultad de Ingeniería</p>
    </div>

    <form>
      <div class="input-group">
        <label for="carnet">Registro Académico (Carnet)</label>
        <input type="text" id="carnet" placeholder="Ej. 202612345">
      </div>

      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@ingenieria.usac.edu.gt">
      </div>

      <button type="button" class="btn-login">Recuperar Contraseña</button>
    </form>

  </div> </div>
