<div class="login-container">

  <div class="univ-logo-peek">
    <img src="escudo-usac.png" alt="Escudo USAC" class="logo-img-real">
  </div>

  <div class="login-box">
    
    <div class="logo-usac">
      <h1>Registro</h1>
      <p>Facultad de Ingeniería</p>
    </div>

    <form>
      <div class="input-group">
        <label for="carnet">Registro Académico (Carnet)</label>
        <input type="text" id="carnet" placeholder="Ej. 202612345">
      </div>
      <div class="input-group">
        <label for="nombres">Nombres</label>
        <input type="text" id="nombres" >
      </div>
      <div class="input-group">
        <label for="apellidos">Apellidos</label>
        <input type="text" id="apellidos" >
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>

      <div class="input-group">
        <label for="password">Confirmar Contraseña</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>

      <button type="button" class="btn-login">Registrarse</button>
    </form>
